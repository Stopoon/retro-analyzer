<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Quant Terminal - Bloomberg Style</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- API 키 모달 -->
    <div id="apiModal" class="modal">
        <div class="modal-content">
            <h2>보안 인증 (API Key 설정)</h2>
            <p>유튜브 Data API v3 키를 입력하세요. 키는 로컬 브라우저에만 저장되며 서버로 전송되지 않습니다.</p>
            <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
            <button id="btnSaveKey">터미널 접속</button>
            <p class="error-msg" id="modalError"></p>
        </div>
    </div>

    <div class="app-container">
        <!-- 모바일 방어용 오버레이 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 좌측 사이드바 -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">YT-QUANT TERM.</div>
            
            <nav class="nav-menu">
                <div class="menu-group">
                    <div class="group-title">퀵 리서치 (트렌드)</div>
                    <button class="menu-btn" data-query="주식투자">► 주식투자</button>
                    <button class="menu-btn" data-query="재테크">► 재테크</button>
                    <button class="menu-btn" data-query="부업">► 부업</button>
                    <button class="menu-btn" data-query="최신 경제 뉴스">► 실시간 트렌드</button>
                </div>
                
                <div class="menu-group" style="margin-top: 30px;">
                    <div class="group-title">시스템 설정</div>
                    <button class="menu-btn" id="btnResetKey">► API 키 재설정</button>
                    <button class="menu-btn" id="btnClearCache" style="color: coral;">► 로컬 캐시 초기화</button>
                </div>
            </nav>
            <div class="terminal-status">
                <span class="status-dot"></span> SECURE CACHE ACTIVE
            </div>
        </aside>

        <!-- 우측 메인 대시보드 -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="mobileMenuToggle" class="mobile-toggle">☰</button>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="채널 핸들(@) 또는 URL, 검색어를 입력하세요 (채널/영상 정밀 검증기)">
                        <button id="btnSearch">SCAN</button>
                    </div>
                </div>
                <div class="topbar-right">
                    <button id="btnExportCSV" class="btn-csv">[ CSV 다운로드 ]</button>
                </div>
            </header>

            <div class="status-bar" id="statusBar">
                시스템 대기 중... 좌측 퀵 리서치를 클릭하거나 검색어를 입력하세요.
            </div>

            <!-- 결과 테이블 영역 -->
            <div class="data-view-container">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>썸네일</th>
                            <th>제목 / 채널명</th>
                            <th>구독자 수</th>
                            <th>조회수</th>
                            <th>활동성 지수(%)</th>
                            <th>검증 뱃지</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 동적 데이터 렌더링 -->
                        <tr class="empty-row"><td colspan="6">조회된 데이터가 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 스크립트 모듈 -->
    <script src="js/app.js"></script>
</body>
</html>
